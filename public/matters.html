<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matters — LexJamaica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 50:'#f0f4ff',100:'#e0e9ff',200:'#c7d7fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } } } } }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-container" class="hidden lg:flex w-56 shrink-0 flex-col"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="lg:hidden flex items-center gap-3 px-4 py-3 bg-brand-800 text-white">
      <i data-lucide="scale" class="h-5 w-5"></i><span class="font-bold">LexJamaica</span>
    </div>
    <main class="flex-1 overflow-y-auto p-6" x-data="mattersPage()" x-init="init()">
      <div class="max-w-6xl mx-auto space-y-5">

        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold text-gray-900">Matters</h1>
          <button @click="showNew = true" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg transition-colors">
            <i data-lucide="plus" class="h-4 w-4"></i>New Matter
          </button>
        </div>

        <!-- Filters -->
        <div class="flex gap-3 flex-wrap">
          <div class="relative flex-1 max-w-xs">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400"></i>
            <input type="search" class="block w-full rounded-lg border border-gray-300 pl-9 pr-3 py-2 text-sm focus:border-brand-500 outline-none" placeholder="Search matters…" x-model="search" @input.debounce.400ms="load()" />
          </div>
          <select class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none bg-white" x-model="statusFilter" @change="load()">
            <option value="">All statuses</option>
            <option value="intake">Intake</option>
            <option value="open">Open</option>
            <option value="on_hold">On Hold</option>
            <option value="closed">Closed</option>
            <option value="archived">Archived</option>
          </select>
          <select class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none bg-white" x-model="areaFilter" @change="load()">
            <option value="">All practice areas</option>
            <template x-for="[k,v] in Object.entries(window.PRACTICE_AREA_LABELS)" :key="k">
              <option :value="k" x-text="v"></option>
            </template>
          </select>
        </div>

        <!-- New matter form -->
        <div x-show="showNew" x-cloak class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
          <h2 class="font-semibold text-gray-900">New Matter</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Client *</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.client_id">
                <option value="">Select client…</option>
                <template x-for="c in clients" :key="c.id"><option :value="c.id" x-text="c.display_name"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.title" placeholder="e.g. Conveyance of 12 Main St" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Practice area *</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.practice_area">
                <template x-for="[k,v] in Object.entries(window.PRACTICE_AREA_LABELS)" :key="k"><option :value="k" x-text="v"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Billing type</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.billing_type">
                <option value="hourly">Hourly</option>
                <option value="fixed">Fixed fee</option>
                <option value="contingency">Contingency</option>
                <option value="retainer">Retainer</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Court name</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.court_name" placeholder="Supreme Court of Jamaica" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Court file number</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.court_file_number" placeholder="CL 2024/001" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Parish</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.parish">
                <option value="">Select parish…</option>
                <template x-for="p in window.JAMAICAN_PARISHES" :key="p"><option :value="p" x-text="p"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Budget (JMD)</label>
              <input type="number" min="0" class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.budget_amount" placeholder="0.00" />
            </div>
          </div>
          <div x-show="formError" class="text-sm text-red-600" x-text="formError"></div>
          <div class="flex gap-2">
            <button @click="save()" :disabled="saving" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg">
              <span x-show="saving" class="animate-spin h-3.5 w-3.5 border-2 border-white border-t-transparent rounded-full"></span>
              <span x-text="saving ? 'Saving…' : 'Create Matter'"></span>
            </button>
            <button @click="showNew = false; resetForm()" class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
          </div>
        </div>

        <!-- Matters table -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 uppercase">Matter</th>
                <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 uppercase">Client</th>
                <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 uppercase">Area</th>
                <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 uppercase">Opened</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 bg-white">
              <template x-if="loading"><tr><td colspan="5" class="px-5 py-10 text-center text-sm text-gray-400">Loading…</td></tr></template>
              <template x-if="!loading && matters.length === 0"><tr><td colspan="5" class="px-5 py-10 text-center text-sm text-gray-500">No matters found.</td></tr></template>
              <template x-for="m in matters" :key="m.id">
                <tr class="hover:bg-gray-50 cursor-pointer" @click="window.location.href = '/matter.html?id=' + m.id">
                  <td class="px-5 py-3">
                    <p class="text-sm font-medium text-gray-900" x-text="m.title"></p>
                    <p class="text-xs text-gray-400" x-text="m.matter_number"></p>
                  </td>
                  <td class="px-5 py-3 text-sm text-gray-700" x-text="m.clients?.display_name || '—'"></td>
                  <td class="px-5 py-3 text-sm text-gray-600" x-text="window.PRACTICE_AREA_LABELS[m.practice_area] || m.practice_area"></td>
                  <td class="px-5 py-3">
                    <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium capitalize"
                      :class="window.MATTER_STATUS_COLORS[m.status] || 'bg-gray-100 text-gray-700'" x-text="m.status.replace('_',' ')"></span>
                  </td>
                  <td class="px-5 py-3 text-sm text-gray-500" x-text="window.formatDate(m.opened_at)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

      </div>
    </main>
  </div>
</div>
<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

<script>
function mattersPage() {
  return {
    matters: [], clients: [], loading: true,
    search: '', statusFilter: '', areaFilter: '',
    showNew: false, saving: false, formError: '',
    form: { client_id: '', title: '', practice_area: 'litigation', billing_type: 'hourly', court_name: '', court_file_number: '', parish: '', budget_amount: '' },
    tenantId: '',

    async init() {
      const user = await window.requireAuth();
      if (!user) return;
      this.tenantId = user.user_metadata.tenant_id;
      lucide.createIcons();
      const params = new URLSearchParams(location.search);
      if (params.get('clientId')) this.form.client_id = params.get('clientId');
      if (window.location.hash.startsWith('#new')) this.showNew = true;
      const { data: cl } = await window.sb.from('clients').select('id, display_name').order('display_name');
      this.clients = cl || [];
      await this.load();
    },

    async load() {
      this.loading = true;
      let q = window.sb.from('matters').select('id, matter_number, title, practice_area, status, opened_at, clients(display_name)').order('created_at', { ascending: false });
      if (this.statusFilter) q = q.eq('status', this.statusFilter);
      if (this.areaFilter)  q = q.eq('practice_area', this.areaFilter);
      if (this.search)      q = q.ilike('title', `%${this.search}%`);
      const { data } = await q.limit(100);
      this.matters = data || [];
      this.loading = false;
    },

    async save() {
      this.formError = '';
      if (!this.form.client_id || !this.form.title) { this.formError = 'Client and title are required.'; return; }
      this.saving = true;
      // Generate matter number via DB function
      const { data: numData } = await window.sb.rpc('generate_matter_number', { p_tenant_id: this.tenantId });
      const payload = { ...this.form, tenant_id: this.tenantId, matter_number: numData, status: 'intake' };
      if (!payload.budget_amount) delete payload.budget_amount;
      const { error } = await window.sb.from('matters').insert(payload);
      this.saving = false;
      if (error) { this.formError = error.message; return; }
      window.toast('Matter created');
      this.showNew = false;
      this.resetForm();
      await this.load();
    },

    resetForm() {
      this.form = { client_id: '', title: '', practice_area: 'litigation', billing_type: 'hourly', court_name: '', court_file_number: '', parish: '', budget_amount: '' };
      this.formError = '';
    },
  };
}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
