<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LexJamaica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 50:'#f0f4ff',100:'#e0e9ff',200:'#c7d7fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } } } } }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">

<div class="w-full max-w-md space-y-8" x-data="loginPage()" x-init="init()">
  <div class="text-center">
    <div class="flex justify-center mb-4">
      <div class="bg-brand-600 rounded-xl p-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/></svg>
      </div>
    </div>
    <h1 class="text-3xl font-bold text-gray-900">LexJamaica</h1>
    <p class="mt-1 text-sm text-gray-500">Legal Practice Management</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 space-y-5">
    <h2 class="text-xl font-semibold text-gray-900">Sign in to your firm</h2>

    <div x-show="error" class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700" x-text="error"></div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
      <input type="email" x-model="email" @keyup.enter="submit()"
        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none"
        placeholder="you@yourfirm.com" autocomplete="email" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" x-model="password" @keyup.enter="submit()"
        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none"
        placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button @click="submit()" :disabled="loading"
      class="w-full flex justify-center items-center gap-2 py-2.5 px-4 bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg transition-colors">
      <span x-show="loading" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
      <span x-text="loading ? 'Signing in…' : 'Sign in'"></span>
    </button>

    <p class="text-center text-sm text-gray-500">
      New firm? <a href="/register.html" class="text-brand-600 font-medium hover:underline">Register your practice</a>
    </p>
  </div>
</div>

<script>
  const { createClient } = window.supabase;
  const sb = createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON__);

  function loginPage() {
    return {
      email: '', password: '', loading: false, error: '',
      async init() {
        const { data: { user } } = await sb.auth.getUser();
        if (user) window.location.href = '/dashboard.html';
      },
      async submit() {
        this.error = '';
        if (!this.email || !this.password) { this.error = 'Please enter your email and password.'; return; }
        this.loading = true;
        const { error } = await sb.auth.signInWithPassword({ email: this.email, password: this.password });
        this.loading = false;
        if (error) { this.error = error.message; return; }
        window.location.href = '/dashboard.html';
      }
    };
  }
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
