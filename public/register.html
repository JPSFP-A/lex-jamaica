<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Your Firm — LexJamaica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 50:'#f0f4ff',100:'#e0e9ff',200:'#c7d7fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } } } } }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">

<div class="w-full max-w-md space-y-8" x-data="registerPage()" x-init="init()">
  <div class="text-center">
    <div class="flex justify-center mb-4">
      <div class="bg-brand-600 rounded-xl p-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/></svg>
      </div>
    </div>
    <h1 class="text-3xl font-bold text-gray-900">LexJamaica</h1>
    <p class="mt-1 text-sm text-gray-500">Register your law firm</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 space-y-5">
    <h2 class="text-xl font-semibold text-gray-900">Create your practice account</h2>

    <div x-show="error" class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700" x-text="error"></div>
    <div x-show="success" class="rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700">
      Firm registered! Redirecting to sign in…
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Firm / Practice name</label>
      <input type="text" x-model="form.firmName"
        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none"
        placeholder="Kingston Legal Chambers" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Your full name</label>
      <input type="text" x-model="form.fullName"
        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none"
        placeholder="Jane Smith" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
      <input type="email" x-model="form.email"
        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none"
        placeholder="jane@yourfirm.com" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" x-model="form.password"
        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none"
        placeholder="Min. 8 characters" />
    </div>

    <button @click="submit()" :disabled="loading || success"
      class="w-full flex justify-center items-center gap-2 py-2.5 px-4 bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg transition-colors">
      <span x-show="loading" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
      <span x-text="loading ? 'Registering…' : 'Register firm'"></span>
    </button>

    <p class="text-center text-sm text-gray-500">
      Already registered? <a href="/login.html" class="text-brand-600 font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>

<script>
  const SUPABASE_URL  = window.__SUPABASE_URL__;
  const SUPABASE_ANON = window.__SUPABASE_ANON__;
  const { createClient } = window.supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  function registerPage() {
    return {
      form: { firmName: '', fullName: '', email: '', password: '' },
      loading: false, error: '', success: false,
      async init() {
        const { data: { user } } = await sb.auth.getUser();
        if (user) window.location.href = '/dashboard.html';
      },
      async submit() {
        this.error = '';
        const { firmName, fullName, email, password } = this.form;
        if (!firmName || !fullName || !email || !password) {
          this.error = 'All fields are required.'; return;
        }
        if (password.length < 8) { this.error = 'Password must be at least 8 characters.'; return; }
        this.loading = true;
        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/register-firm`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON}` },
            body: JSON.stringify({ firmName, fullName, email, password }),
          });
          const data = await res.json();
          if (!res.ok || data.error) { this.error = data.error || 'Registration failed.'; return; }
          this.success = true;
          setTimeout(() => window.location.href = '/login.html', 2000);
        } catch (e) {
          this.error = 'Network error. Please try again.';
        } finally {
          this.loading = false;
        }
      }
    };
  }
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
