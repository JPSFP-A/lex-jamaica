<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — LexJamaica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 50:'#f0f4ff',100:'#e0e9ff',200:'#c7d7fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } } } } }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-container" class="hidden lg:flex w-56 shrink-0 flex-col"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="lg:hidden flex items-center gap-3 px-4 py-3 bg-brand-800 text-white">
      <i data-lucide="scale" class="h-5 w-5"></i><span class="font-bold">LexJamaica</span>
    </div>
    <main class="flex-1 overflow-y-auto p-6" x-data="calendarPage()" x-init="init()">
      <div class="max-w-4xl mx-auto space-y-5">

        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold text-gray-900">Calendar</h1>
          <button @click="showNew = true" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg">
            <i data-lucide="plus" class="h-4 w-4"></i>New Event
          </button>
        </div>

        <!-- New event form -->
        <div x-show="showNew" x-cloak class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 space-y-4">
          <h2 class="font-semibold text-gray-900">New Event</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.title" placeholder="e.g. Hearing — Smith v Jones" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Event type *</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.event_type">
                <option value="hearing">Hearing</option>
                <option value="meeting">Meeting</option>
                <option value="deadline">Deadline</option>
                <option value="deposition">Deposition</option>
                <option value="arbitration">Arbitration</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Matter</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.matter_id">
                <option value="">No matter</option>
                <template x-for="m in matters" :key="m.id"><option :value="m.id" x-text="m.matter_number + ' — ' + m.title"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Starts at *</label>
              <input type="datetime-local" class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.starts_at" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Ends at</label>
              <input type="datetime-local" class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.ends_at" />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="form.location" placeholder="Supreme Court, Kingston" />
            </div>
          </div>
          <div class="flex gap-2">
            <button @click="save()" :disabled="saving || !form.title || !form.starts_at" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg">
              <span x-show="saving" class="animate-spin h-3.5 w-3.5 border-2 border-white border-t-transparent rounded-full"></span>
              <span x-text="saving ? 'Saving…' : 'Create Event'"></span>
            </button>
            <button @click="showNew = false" class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
          </div>
        </div>

        <!-- Month navigation -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
          <div class="px-5 py-4 border-b border-gray-200 flex items-center justify-between">
            <button @click="prevMonth()" class="p-1 rounded hover:bg-gray-100"><i data-lucide="chevron-left" class="h-5 w-5 text-gray-500"></i></button>
            <h2 class="font-semibold text-gray-900" x-text="monthLabel"></h2>
            <button @click="nextMonth()" class="p-1 rounded hover:bg-gray-100"><i data-lucide="chevron-right" class="h-5 w-5 text-gray-500"></i></button>
          </div>

          <!-- Day grid -->
          <div class="grid grid-cols-7 text-center text-xs font-medium text-gray-400 border-b border-gray-100 py-2">
            <template x-for="d in ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']" :key="d"><div x-text="d"></div></template>
          </div>
          <div class="grid grid-cols-7">
            <template x-for="(day, i) in calendarDays" :key="i">
              <div class="min-h-[72px] border-b border-r border-gray-100 p-1" :class="day.today ? 'bg-brand-50' : ''">
                <p class="text-xs font-medium mb-1" :class="day.currentMonth ? (day.today ? 'text-brand-600' : 'text-gray-700') : 'text-gray-300'" x-text="day.date"></p>
                <template x-for="e in day.events" :key="e.id">
                  <div class="text-xs bg-brand-100 text-brand-800 rounded px-1 py-0.5 mb-0.5 truncate cursor-pointer" x-text="e.title" :title="e.title + '\n' + window.formatDateTime(e.starts_at)"></div>
                </template>
              </div>
            </template>
          </div>
        </div>

        <!-- Upcoming list -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
          <div class="px-5 py-4 border-b border-gray-200">
            <h2 class="font-semibold text-gray-900">Upcoming Events</h2>
          </div>
          <div class="divide-y divide-gray-100">
            <template x-if="events.length === 0"><p class="px-5 py-8 text-center text-sm text-gray-500">No upcoming events.</p></template>
            <template x-for="e in events" :key="e.id">
              <div class="flex items-start justify-between px-5 py-3">
                <div>
                  <p class="text-sm font-medium text-gray-900" x-text="e.title"></p>
                  <p class="text-xs text-gray-500" x-text="window.formatDateTime(e.starts_at) + (e.location ? ' · ' + e.location : '') + (e.matters ? ' · ' + e.matters.matter_number : '')"></p>
                </div>
                <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-brand-100 text-brand-700 capitalize" x-text="e.event_type.replace('_',' ')"></span>
              </div>
            </template>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

<script>
function calendarPage() {
  return {
    events: [], matters: [], allEvents: [],
    showNew: false, saving: false,
    form: { title: '', event_type: 'hearing', matter_id: '', starts_at: '', ends_at: '', location: '' },
    tenantId: '',
    viewYear: new Date().getFullYear(),
    viewMonth: new Date().getMonth(),

    get monthLabel() {
      return new Date(this.viewYear, this.viewMonth).toLocaleString('en-JM', { month: 'long', year: 'numeric' });
    },

    get calendarDays() {
      const first = new Date(this.viewYear, this.viewMonth, 1);
      const last  = new Date(this.viewYear, this.viewMonth + 1, 0);
      const days  = [];
      const today = new Date();
      // Pad start
      for (let i = 0; i < first.getDay(); i++) {
        const d = new Date(this.viewYear, this.viewMonth, -first.getDay() + i + 1);
        days.push({ date: d.getDate(), currentMonth: false, today: false, events: [] });
      }
      for (let d = 1; d <= last.getDate(); d++) {
        const dt = new Date(this.viewYear, this.viewMonth, d);
        const isToday = dt.toDateString() === today.toDateString();
        const evs = this.allEvents.filter(e => {
          const ed = new Date(e.starts_at);
          return ed.getFullYear() === this.viewYear && ed.getMonth() === this.viewMonth && ed.getDate() === d;
        });
        days.push({ date: d, currentMonth: true, today: isToday, events: evs });
      }
      // Pad end
      const rem = 42 - days.length;
      for (let i = 1; i <= rem; i++) days.push({ date: i, currentMonth: false, today: false, events: [] });
      return days;
    },

    async init() {
      const user = await window.requireAuth();
      if (!user) return;
      this.tenantId = user.user_metadata.tenant_id;
      lucide.createIcons();
      if (window.location.hash === '#new') this.showNew = true;
      const { data: ml } = await window.sb.from('matters').select('id, matter_number, title').order('matter_number');
      this.matters = ml || [];
      await this.load();
    },

    async load() {
      // Upcoming 90 days
      const { data: upcoming } = await window.sb.from('calendar_events')
        .select('*, matters(matter_number)')
        .gte('starts_at', new Date().toISOString())
        .order('starts_at')
        .limit(50);
      this.events = upcoming || [];

      // Full month for grid
      const start = new Date(this.viewYear, this.viewMonth, 1).toISOString();
      const end   = new Date(this.viewYear, this.viewMonth + 1, 1).toISOString();
      const { data: month } = await window.sb.from('calendar_events')
        .select('*').gte('starts_at', start).lt('starts_at', end).order('starts_at');
      this.allEvents = month || [];
    },

    prevMonth() { if (this.viewMonth === 0) { this.viewMonth = 11; this.viewYear--; } else this.viewMonth--; this.load(); },
    nextMonth() { if (this.viewMonth === 11) { this.viewMonth = 0; this.viewYear++; } else this.viewMonth++; this.load(); },

    async save() {
      this.saving = true;
      const { error } = await window.sb.from('calendar_events').insert({
        tenant_id: this.tenantId,
        title: this.form.title,
        event_type: this.form.event_type,
        matter_id: this.form.matter_id || null,
        starts_at: this.form.starts_at,
        ends_at: this.form.ends_at || null,
        location: this.form.location || null,
      });
      this.saving = false;
      if (error) { window.toast(error.message, 'error'); return; }
      window.toast('Event created');
      this.showNew = false;
      this.form = { title: '', event_type: 'hearing', matter_id: '', starts_at: '', ends_at: '', location: '' };
      await this.load();
    },
  };
}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
