<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JW Business Solutions — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:{50:'#f0f4ff',100:'#e0e8f7',600:'#2d4a8a',700:'#1e3570',800:'#152860',900:'#0d1c47'},gold:{300:'#f0d080',400:'#e8c040',500:'#c8a030',600:'#a88020'}}}}}</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="min-h-screen bg-navy-900 flex items-center justify-center p-4" x-data="loginApp()" x-init="init()">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gold-500 rounded-2xl mb-4">
        <svg class="w-9 h-9 text-navy-900" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1M4.22 4.22l.707.707m12.02 12.02.707.707M1 12h1m20 0h1M4.22 19.78l.707-.707M18.95 5.05l.707-.707"/><circle cx="12" cy="12" r="4"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white">JW Business Solutions</h1>
      <p class="text-navy-100 text-sm mt-1 opacity-70">Select your company and enter your access code</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8 space-y-5">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Company</label>
        <select x-model="companyId" class="block w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:border-navy-600 focus:ring-1 focus:ring-navy-600 outline-none bg-white">
          <option value="">Select your company…</option>
          <template x-for="c in companies" :key="c.id">
            <option :value="c.id" x-text="c.company_name"></option>
          </template>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Access Code</label>
        <input type="password" x-model="code" @keydown.enter="login()"
          class="block w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:border-navy-600 focus:ring-1 focus:ring-navy-600 outline-none"
          placeholder="Enter your code" />
      </div>

      <div x-show="error" x-cloak class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700" x-text="error"></div>

      <button @click="login()" :disabled="loading || !companyId || !code"
        class="w-full py-3 bg-navy-800 hover:bg-navy-700 disabled:opacity-50 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">
        <span x-show="loading" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
        <span x-text="loading ? 'Checking…' : 'Enter Portal'"></span>
      </button>

      <div class="text-center pt-2 flex items-center justify-center gap-4">
        <a href="/consultant.html" class="text-xs text-gray-400 hover:text-navy-700 transition-colors">Consultant →</a>
        <span class="text-gray-200">|</span>
        <a href="/onboarding-admin.html" class="text-xs text-gray-400 hover:text-navy-700 transition-colors">Admin →</a>
      </div>
    </div>
  </div>

<script>
const sb = supabase.createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON__);

function loginApp() {
  return {
    companies: [],
    companyId: '',
    code: '',
    error: '',
    loading: false,

    async init() {
      // Already logged in? Route to correct portal
      const existingId = sessionStorage.getItem('ob_client_id');
      if (existingId) {
        this.routeToPortal(sessionStorage.getItem('ob_service_type') || 'implementation');
        return;
      }
      const { data } = await sb.from('onboarding_clients')
        .select('id, company_name, service_type').eq('is_active', true).order('company_name');
      this.companies = data || [];
    },

    routeToPortal(serviceType) {
      const routes = {
        implementation: '/onboarding.html',
        bookkeeping:    '/bookkeeping-portal.html',
        training:       '/training-portal.html',
        adhoc:          '/adhoc-portal.html',
      };
      window.location.href = routes[serviceType] || '/onboarding.html';
    },

    async login() {
      this.error = '';
      if (!this.companyId || !this.code) return;
      this.loading = true;
      const { data, error } = await sb.rpc('validate_onboarding_access', {
        p_company_id: this.companyId,
        p_code: this.code,
      });
      this.loading = false;
      if (error || !data) {
        // log_failure recorded inside validate_onboarding_access RPC
        this.error = 'Invalid code. Please check with your consultant.';
        return;
      }
      // success logged inside RPC
      const company = this.companies.find(c => c.id === this.companyId);
      sessionStorage.setItem('ob_client_id', data);
      sessionStorage.setItem('ob_company_name', company?.company_name || '');
      sessionStorage.setItem('ob_service_type', company?.service_type || 'implementation');
      this.routeToPortal(company?.service_type || 'implementation');
    },
  };
}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
