<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JW Business Solutions — Consultant Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 50:'#f0f4ff', 100:'#e0e8f7', 600:'#2d4a8a', 700:'#1e3570', 800:'#152860', 900:'#0d1c47' },
            gold:  { 300:'#f0d080', 400:'#e8c040', 500:'#c8a030', 600:'#a88020' },
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/sections.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-100 min-h-screen font-sans" x-data="consultantApp()" x-init="init()">

<!-- ══ PIN SCREEN ══ -->
<div x-show="!authed" x-cloak class="min-h-screen bg-navy-900 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gold-500 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-navy-900" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Consultant Portal</h1>
      <p class="text-navy-100 text-sm mt-1 opacity-70">JW Business Solutions</p>
    </div>
    <div class="bg-white rounded-2xl shadow-2xl p-8 space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Consultant PIN</label>
        <input type="password" x-model="pin" @keydown.enter="checkPin()" maxlength="10"
          class="block w-full rounded-xl border border-gray-200 px-4 py-3 text-center text-lg tracking-widest focus:border-navy-600 focus:ring-1 focus:ring-navy-600 outline-none"
          placeholder="••••••" />
      </div>
      <div x-show="pinError" x-cloak class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700" x-text="pinError"></div>
      <button @click="checkPin()" :disabled="pinLoading || !pin"
        class="w-full py-3 bg-navy-800 hover:bg-navy-700 disabled:opacity-50 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">
        <span x-show="pinLoading" class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
        <span x-text="pinLoading ? 'Checking…' : 'Enter Portal'"></span>
      </button>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div x-show="authed" x-cloak>

  <!-- HEADER -->
  <header class="bg-navy-900 text-white sticky top-0 z-40 shadow-lg">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button x-show="activeClient" @click="backToList()" class="p-1.5 rounded-lg bg-navy-800 hover:bg-navy-700 transition-colors mr-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div class="w-9 h-9 bg-gold-500 rounded-lg flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-navy-900" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <div>
          <p class="text-xs text-navy-100 font-medium uppercase tracking-wider" x-text="activeClient ? activeClient.company_name : 'All Clients'"></p>
          <h1 class="text-base font-bold leading-tight">Consultant Portal</h1>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <!-- Admin back button (preview mode) -->
        <button x-show="isAdminPreview" @click="backToAdmin()"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-amber-500 text-white hover:bg-amber-400 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Admin
        </button>
        <button x-show="!isAdminPreview" @click="logout()"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-navy-800 text-gray-300 hover:bg-navy-700 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Logout
        </button>
      </div>
    </div>

    <!-- Client view tabs -->
    <div x-show="activeClient" class="max-w-5xl mx-auto px-4 flex gap-1">
      <button @click="activeTab='checklist'"
        class="px-4 py-2.5 text-xs font-semibold border-b-2 transition-colors"
        :class="activeTab==='checklist' ? 'border-gold-400 text-gold-300' : 'border-transparent text-navy-100 hover:text-white'">
        Checklist
      </button>
      <button x-show="perms.timeline" @click="activeTab='timeline'"
        class="px-4 py-2.5 text-xs font-semibold border-b-2 transition-colors"
        :class="activeTab==='timeline' ? 'border-gold-400 text-gold-300' : 'border-transparent text-navy-100 hover:text-white'">
        Timeline
      </button>
      <button x-show="perms.accounts" @click="activeTab='accounts'"
        class="px-4 py-2.5 text-xs font-semibold border-b-2 transition-colors"
        :class="activeTab==='accounts' ? 'border-gold-400 text-gold-300' : 'border-transparent text-navy-100 hover:text-white'">
        Chart of Accounts
      </button>
    </div>
  </header>

  <!-- ══ CLIENT LIST ══ -->
  <div x-show="!activeClient" class="max-w-5xl mx-auto px-4 py-6">
    <div x-show="listLoading" class="text-center py-20 text-gray-400">Loading clients…</div>

    <div x-show="!listLoading" class="space-y-3">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Your Active Clients</p>
      <template x-for="c in clients" :key="c.id">
        <button @click="openClient(c)" class="w-full text-left bg-white rounded-xl border border-gray-200 shadow-sm p-5 hover:border-navy-300 hover:shadow-md transition-all">
          <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-10 h-10 rounded-xl bg-navy-100 flex items-center justify-center shrink-0">
                <span class="text-sm font-bold text-navy-700" x-text="c.company_name.charAt(0)"></span>
              </div>
              <div class="min-w-0">
                <p class="font-semibold text-gray-900 truncate" x-text="c.company_name"></p>
                <p class="text-xs text-gray-400 capitalize" x-text="(c.service_type||'implementation') + ' · ' + (c.template||'general')"></p>
              </div>
            </div>
            <div class="shrink-0 flex items-center gap-3">
              <div class="text-right">
                <p class="text-sm font-bold text-navy-700" x-text="clientProgress(c.id) + '%'"></p>
                <p class="text-xs text-gray-400">complete</p>
              </div>
              <div class="w-2 h-2 rounded-full" :class="c.is_active ? 'bg-green-400' : 'bg-gray-300'"></div>
            </div>
          </div>
          <!-- Progress bar -->
          <div class="mt-3 h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-navy-600 rounded-full transition-all" :style="'width:' + clientProgress(c.id) + '%'"></div>
          </div>
        </button>
      </template>
    </div>
  </div>

  <!-- ══ CLIENT DETAIL VIEW ══ -->
  <div x-show="activeClient">

    <!-- CHECKLIST TAB -->
    <div x-show="activeTab==='checklist'" class="max-w-5xl mx-auto px-4 py-4 space-y-3">

      <!-- Stats bar -->
      <div x-show="!clientLoading" class="grid grid-cols-3 gap-3 mb-2">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
          <p class="text-2xl font-bold text-navy-800" x-text="completedCount"></p>
          <p class="text-xs text-gray-400 mt-0.5">Completed</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
          <p class="text-2xl font-bold text-gray-500" x-text="totalCount - completedCount"></p>
          <p class="text-xs text-gray-400 mt-0.5">Pending</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 text-center">
          <p class="text-2xl font-bold text-gold-500" x-text="totalCount ? Math.round(completedCount/totalCount*100) + '%' : '0%'"></p>
          <p class="text-xs text-gray-400 mt-0.5">Progress</p>
        </div>
      </div>

      <div x-show="clientLoading" class="text-center py-20 text-gray-400">Loading…</div>

      <template x-for="section in sections" :key="section.id">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
          <!-- Section header -->
          <button @click="section.open = !section.open" class="w-full flex items-center justify-between px-5 py-4 text-left hover:bg-gray-50 transition-colors">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-navy-100">
                <svg class="w-4 h-4 text-navy-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
              </div>
              <div>
                <h2 class="font-semibold text-gray-900" x-text="section.title"></h2>
                <p class="text-xs text-gray-400" x-text="sectionProgress(section)"></p>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
                :class="sectionComplete(section) ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                x-text="sectionComplete(section) ? 'Done' : 'In Progress'"></span>
              <svg :class="section.open ? 'rotate-180' : ''" class="w-4 h-4 text-gray-400 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </button>

          <!-- Items -->
          <div x-show="section.open" class="border-t border-gray-100 divide-y divide-gray-50">
            <template x-for="item in section.items" :key="item.id">
              <div x-show="item.type !== 'info'" class="px-5 py-4">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                      <!-- Completion indicator -->
                      <div class="shrink-0 w-5 h-5 rounded-full flex items-center justify-center"
                        :class="responses[item.id]?.is_complete ? 'bg-green-500' : 'bg-gray-200'">
                        <svg x-show="responses[item.id]?.is_complete" class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                      </div>
                      <p class="text-sm font-semibold text-gray-900" :class="responses[item.id]?.is_complete ? 'line-through text-gray-400' : ''" x-text="item.title"></p>
                    </div>
                    <p class="text-xs text-gray-500 ml-7" x-text="item.description"></p>

                    <!-- Client's response (read-only) -->
                    <div x-show="responses[item.id]?.value" class="ml-7 mt-2 bg-gray-50 rounded-lg px-3 py-2 border border-gray-100">
                      <p class="text-xs text-gray-400 font-medium mb-0.5">Client response</p>
                      <p class="text-xs text-gray-700" x-text="responses[item.id]?.value"></p>
                    </div>

                    <!-- Uploads -->
                    <div x-show="(uploads[item.id]||[]).length > 0" class="ml-7 mt-2 flex flex-wrap gap-1.5">
                      <template x-for="f in (uploads[item.id]||[])" :key="f.id">
                        <button @click="downloadFile(f)"
                          class="flex items-center gap-1.5 px-2.5 py-1 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-lg text-xs text-blue-700 font-medium transition-colors">
                          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                          <span x-text="f.file_name"></span>
                        </button>
                      </template>
                    </div>

                    <!-- Comments thread -->
                    <div class="ml-7 mt-3">
                      <button @click="item.showComments = !item.showComments"
                        class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-navy-700 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        <span x-text="(comments[item.id]||[]).length > 0 ? (comments[item.id]||[]).length + ' comment' + ((comments[item.id]||[]).length > 1 ? 's' : '') : 'Add comment'"></span>
                        <svg :class="item.showComments ? 'rotate-180' : ''" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                      </button>

                      <div x-show="item.showComments" class="mt-2 space-y-2">
                        <div class="space-y-2 max-h-48 overflow-y-auto">
                          <template x-for="c in (comments[item.id]||[])" :key="c.id">
                            <div class="flex gap-2">
                              <div class="shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold mt-0.5"
                                :class="c.author_type==='consultant' ? 'bg-navy-800 text-gold-400' : 'bg-gray-200 text-gray-600'">
                                <span x-text="c.author_type==='consultant' ? 'C' : 'G'"></span>
                              </div>
                              <div class="flex-1 min-w-0">
                                <div class="flex items-baseline gap-1.5">
                                  <span class="text-xs font-semibold" :class="c.author_type==='consultant' ? 'text-navy-800' : 'text-gray-700'" x-text="c.author_name"></span>
                                  <span class="text-xs text-gray-400" x-text="formatTime(c.created_at)"></span>
                                </div>
                                <p class="text-xs text-gray-700 mt-0.5 whitespace-pre-wrap" x-text="c.message"></p>
                              </div>
                            </div>
                          </template>
                        </div>
                        <!-- Comment input (if permitted) -->
                        <div x-show="perms.comments" class="flex gap-2 items-end">
                          <textarea rows="2" :id="'c-input-' + item.id"
                            placeholder="Add consultant note…"
                            class="flex-1 rounded-lg border border-gray-200 px-3 py-2 text-xs focus:border-navy-500 focus:ring-1 focus:ring-navy-500 outline-none resize-none"></textarea>
                          <button @click="addComment(item.id)"
                            class="shrink-0 px-3 py-2 bg-navy-800 hover:bg-navy-700 text-white text-xs font-semibold rounded-lg transition-colors">Send</button>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Mark complete button -->
                  <div x-show="perms.mark_complete" class="shrink-0">
                    <button @click="toggleComplete(item.id)"
                      :class="responses[item.id]?.is_complete ? 'bg-green-100 text-green-700 hover:bg-red-50 hover:text-red-600 border-green-200' : 'bg-gray-100 text-gray-500 hover:bg-green-50 hover:text-green-700 border-gray-200'"
                      class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-colors whitespace-nowrap">
                      <svg x-show="responses[item.id]?.is_complete" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                      <svg x-show="!responses[item.id]?.is_complete" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                      <span x-text="responses[item.id]?.is_complete ? 'Done' : 'Mark done'"></span>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>

    <!-- TIMELINE TAB -->
    <div x-show="activeTab==='timeline' && perms.timeline" class="max-w-5xl mx-auto px-4 py-6">
      <div x-show="phases.length === 0" class="bg-white rounded-xl border border-gray-200 shadow-sm py-20 text-center">
        <p class="text-gray-500 font-medium">No timeline set</p>
        <p class="text-xs text-gray-400 mt-1">Set phases in the admin panel.</p>
      </div>
      <div x-show="phases.length > 0" class="space-y-3">
        <template x-for="p in phases" :key="p.id">
          <div class="bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-4">
            <div class="flex items-center justify-between gap-4">
              <div class="min-w-0">
                <p class="font-semibold text-gray-900" x-text="p.phase_name"></p>
                <p class="text-xs text-gray-400 mt-0.5" x-text="formatDate(p.target_start) + ' – ' + formatDate(p.target_end)"></p>
              </div>
              <span class="text-xs font-semibold px-2.5 py-1 rounded-full shrink-0"
                :class="p.is_complete ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'"
                x-text="p.is_complete ? 'Done' : 'Active'"></span>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ACCOUNTS TAB -->
    <div x-show="activeTab==='accounts' && perms.accounts" class="max-w-5xl mx-auto px-4 py-6 space-y-4">
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
        <h2 class="font-bold text-gray-900 mb-4">Chart of Accounts</h2>
        <template x-for="group in coaGroups" :key="group.label">
          <div class="mb-4">
            <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2" x-text="group.label"></p>
            <div class="space-y-1">
              <template x-for="acct in group.accounts" :key="acct.code">
                <div class="flex items-center gap-3 px-3 py-2 rounded-lg"
                  :class="coaUnlocked.has(acct.code) ? 'bg-green-50 border border-green-100' : 'bg-gray-50 border border-gray-100'">
                  <span class="text-xs font-mono font-semibold text-gray-500 w-12 shrink-0" x-text="acct.code"></span>
                  <span class="text-xs text-gray-700 flex-1" x-text="acct.name"></span>
                  <span x-show="coaUnlocked.has(acct.code)" class="text-xs text-green-600 font-semibold">Unlocked</span>
                  <span x-show="!coaUnlocked.has(acct.code)" class="text-xs text-gray-400">Pending</span>
                </div>
              </template>
            </div>
          </div>
        </template>
        <!-- Custom accounts -->
        <div x-show="coaCustom.length > 0" class="mt-4 pt-4 border-t border-gray-100">
          <p class="text-xs font-bold text-purple-600 uppercase tracking-wider mb-2">Custom Accounts</p>
          <div class="space-y-1">
            <template x-for="acct in coaCustom" :key="acct.code">
              <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-purple-50 border border-purple-100">
                <span class="text-xs font-mono font-semibold text-purple-600 w-12 shrink-0" x-text="acct.code"></span>
                <span class="text-xs text-gray-700 flex-1" x-text="acct.name"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>

  </div><!-- end activeClient -->
</div><!-- end authed -->

<script>
const sb = supabase.createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON__);

function consultantApp() {
  return {
    authed: false,
    pin: '', pinError: '', pinLoading: false,
    isAdminPreview: false,

    // Client list
    clients: [], listLoading: false, responseSummary: {},

    // Active client
    activeClient: null,
    activeTab: 'checklist',
    clientLoading: false,
    sections: [],
    responses: {},
    comments: {},
    uploads: {},
    phases: [],
    coaGroups: [],
    coaUnlocked: new Set(),
    coaCustom: [],
    perms: { mark_complete: true, timeline: true, accounts: true, comments: true },

    get totalCount()     { return this.sections.flatMap(s => s.items.filter(i => i.type !== 'info')).length; },
    get completedCount() { return Object.values(this.responses).filter(r => r.is_complete).length; },

    sectionProgress(section) {
      const items = section.items.filter(i => i.type !== 'info');
      const done  = items.filter(i => this.responses[i.id]?.is_complete).length;
      return done + ' of ' + items.length + ' complete';
    },
    sectionComplete(section) {
      const items = section.items.filter(i => i.type !== 'info');
      return items.length > 0 && items.every(i => this.responses[i.id]?.is_complete);
    },
    clientProgress(clientId) {
      const s = this.responseSummary[clientId] || { done: 0, total: 1 };
      return s.total ? Math.round(s.done / s.total * 100) : 0;
    },

    async init() {
      // Admin preview mode: skip PIN
      this.isAdminPreview = sessionStorage.getItem('ob_admin_viewing') === 'true';
      const previewClientId = sessionStorage.getItem('consultant_preview_client');

      if (this.isAdminPreview || sessionStorage.getItem('ob_consultant') === '1') {
        this.authed = true;
        await this.loadClientList();
        if (previewClientId) {
          const c = this.clients.find(x => x.id === previewClientId);
          if (c) await this.openClient(c);
        }
      }
    },

    async checkPin() {
      this.pinError = '';
      this.pinLoading = true;
      const { data, error } = await sb.rpc('validate_consultant_pin', { p_pin: this.pin });
      this.pinLoading = false;
      this.pin = '';
      if (error || !data) { this.pinError = 'Incorrect PIN.'; return; }
      sessionStorage.setItem('ob_consultant', '1');
      this.authed = true;
      await this.loadClientList();
    },

    async loadClientList() {
      this.listLoading = true;
      const { data: clients } = await sb.from('onboarding_clients').select('*').eq('is_active', true).order('company_name');
      this.clients = clients || [];

      // Load completion counts per client
      const { data: resp } = await sb.from('onboarding_responses').select('client_id, is_complete');
      if (resp) {
        resp.forEach(r => {
          if (!this.responseSummary[r.client_id]) this.responseSummary[r.client_id] = { done: 0, total: 0 };
          this.responseSummary[r.client_id].total++;
          if (r.is_complete) this.responseSummary[r.client_id].done++;
        });
      }
      this.listLoading = false;
    },

    async openClient(c) {
      this.activeClient = c;
      this.activeTab = 'checklist';
      this.clientLoading = true;
      this.sections = []; this.responses = {}; this.comments = {}; this.uploads = {}; this.phases = [];
      this.coaGroups = []; this.coaUnlocked = new Set(); this.coaCustom = [];

      // Load permissions for this client
      const cp = c.consultant_permissions || {};
      this.perms = {
        mark_complete: cp.mark_complete !== false,
        timeline:      cp.timeline      !== false,
        accounts:      cp.accounts      !== false,
        comments:      cp.comments      !== false,
      };

      await Promise.all([
        this.loadSections(c),
        this.loadResponses(c.id),
        this.loadComments(c.id),
        this.loadUploads(c.id),
        this.loadPhases(c.id),
      ]);
      this.buildCOA(c);
      this.clientLoading = false;
    },

    async loadSections(c) {
      const template = c.template || 'general';
      const { data } = await sb.from('onboarding_clients').select('checklist_overrides, coa_custom').eq('id', c.id).single();
      const ov = data?.checklist_overrides || {};
      this.coaCustom = data?.coa_custom || [];
      const base = SECTION_TEMPLATES[template] || SECTION_TEMPLATES.general;
      this.sections = base.map(s => ({
        ...s,
        open: true,
        items: s.items
          .filter(i => !ov[i.id]?.hidden)
          .map(i => ({ ...i, showComments: false, title: ov[i.id]?.title ?? i.title, description: ov[i.id]?.description ?? i.description }))
      }));
    },

    async loadResponses(clientId) {
      const { data } = await sb.from('onboarding_responses').select('*').eq('client_id', clientId);
      if (data) data.forEach(r => { this.responses[r.item_id] = r; });
    },

    async loadComments(clientId) {
      const { data } = await sb.from('onboarding_comments').select('*').eq('client_id', clientId).order('created_at');
      if (data) data.forEach(c => {
        if (!this.comments[c.item_id]) this.comments[c.item_id] = [];
        this.comments[c.item_id].push(c);
      });
    },

    async loadUploads(clientId) {
      const { data } = await sb.from('onboarding_uploads').select('*').eq('client_id', clientId);
      if (data) data.forEach(u => {
        if (!this.uploads[u.item_id]) this.uploads[u.item_id] = [];
        this.uploads[u.item_id].push(u);
      });
    },

    async loadPhases(clientId) {
      const { data } = await sb.from('onboarding_gantt_phases').select('*').eq('client_id', clientId).order('target_start');
      this.phases = data || [];
    },

    buildCOA(c) {
      const template = c.template || 'general';
      if (typeof COA_TEMPLATES !== 'undefined') {
        this.coaGroups = COA_TEMPLATES[template] || COA_TEMPLATES.general || [];
      }
      if (typeof COA_MAPPINGS !== 'undefined') {
        const mappings = COA_MAPPINGS[template] || {};
        this.sections.forEach(section => {
          const items = section.items.filter(i => i.type !== 'info');
          const allDone = items.length > 0 && items.every(i => this.responses[i.id]?.is_complete);
          if (allDone) (mappings[section.id] || []).forEach(code => this.coaUnlocked.add(code));
        });
      }
    },

    async toggleComplete(itemId) {
      if (!this.perms.mark_complete) return;
      const current = this.responses[itemId]?.is_complete || false;
      const payload = {
        client_id:    this.activeClient.id,
        item_id:      itemId,
        value:        this.responses[itemId]?.value || '',
        is_complete:  !current,
        completed_at: !current ? new Date().toISOString() : null,
        updated_at:   new Date().toISOString(),
      };
      await sb.from('onboarding_responses').upsert(payload, { onConflict: 'client_id,item_id' });
      this.responses[itemId] = payload;
      // Update summary counts
      if (!this.responseSummary[this.activeClient.id]) this.responseSummary[this.activeClient.id] = { done: 0, total: 0 };
      this.responseSummary[this.activeClient.id].done += !current ? 1 : -1;
      // Audit log
      sb.from('onboarding_audit_log').insert({ client_id: this.activeClient.id, actor: 'consultant', action: !current ? 'mark_complete' : 'unmark_complete', detail: { item_id: itemId } });
    },

    async addComment(itemId) {
      if (!this.perms.comments) return;
      const el = document.getElementById('c-input-' + itemId);
      const message = el?.value?.trim();
      if (!message) return;
      const payload = { client_id: this.activeClient.id, item_id: itemId, author_type: 'consultant', author_name: 'Consultant', message };
      const { data } = await sb.from('onboarding_comments').insert(payload).select().single();
      if (data) {
        if (!this.comments[itemId]) this.comments[itemId] = [];
        this.comments[itemId].push(data);
      }
      if (el) el.value = '';
      sb.from('onboarding_audit_log').insert({ client_id: this.activeClient.id, actor: 'consultant', action: 'comment', detail: { item_id: itemId } });
    },

    async downloadFile(f) {
      const { data, error } = await sb.storage.from('documents').createSignedUrl(f.storage_key, 3600);
      if (error) { alert('Error: ' + error.message); return; }
      window.open(data.signedUrl, '_blank');
    },

    backToList() {
      this.activeClient = null;
      sessionStorage.removeItem('consultant_preview_client');
    },

    backToAdmin() {
      sessionStorage.removeItem('ob_admin_viewing');
      sessionStorage.removeItem('portal_consultant');
      sessionStorage.removeItem('ob_client_id');
      sessionStorage.removeItem('consultant_preview_client');
      window.location.href = '/onboarding-admin.html';
    },

    logout() {
      sessionStorage.removeItem('ob_consultant');
      this.authed = false;
    },

    formatTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleDateString('en-JM', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    },
    formatDate(d) {
      if (!d) return '';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-JM', { day:'numeric', month:'short', year:'numeric' });
    },
  };
}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
