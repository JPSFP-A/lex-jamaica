<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Accounts — LexJamaica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { 50:'#f0f4ff',100:'#e0e9ff',200:'#c7d7fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } } } } }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-container" class="hidden lg:flex w-56 shrink-0 flex-col"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="lg:hidden flex items-center gap-3 px-4 py-3 bg-brand-800 text-white">
      <i data-lucide="scale" class="h-5 w-5"></i><span class="font-bold">LexJamaica</span>
    </div>
    <main class="flex-1 overflow-y-auto p-6" x-data="trustPage()" x-init="init()">
      <div class="max-w-5xl mx-auto space-y-5">

        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
            <i data-lucide="shield" class="h-6 w-6 text-brand-600"></i>Trust Accounts
          </h1>
          <div class="flex gap-2">
            <button @click="showNewAccount = true" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">
              <i data-lucide="plus" class="h-4 w-4"></i>New Account
            </button>
            <button @click="showNewTx = true" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg">
              <i data-lucide="plus" class="h-4 w-4"></i>Transaction
            </button>
          </div>
        </div>

        <!-- Account cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <template x-for="a in accounts" :key="a.id">
            <button @click="selectAccount(a.id)"
              class="bg-white rounded-xl border p-4 text-left transition-colors"
              :class="selectedAccountId === a.id ? 'border-brand-500 ring-1 ring-brand-500' : 'border-gray-200 hover:border-gray-300'">
              <p class="font-semibold text-gray-900" x-text="a.account_name"></p>
              <p class="text-sm text-gray-500" x-text="a.bank_name"></p>
              <p class="text-xs text-gray-400 mt-1" x-text="a.account_reference"></p>
            </button>
          </template>
          <template x-if="accounts.length === 0">
            <p class="text-sm text-gray-500 col-span-3">No trust accounts yet. Create one to get started.</p>
          </template>
        </div>

        <!-- Balance card -->
        <div x-show="selectedAccountId && balance" class="bg-brand-50 border border-brand-200 rounded-xl p-4">
          <p class="text-sm font-medium text-brand-700">Account Balance</p>
          <p class="text-3xl font-bold text-brand-900" x-text="window.formatCurrency(balance?.balance || 0)"></p>
          <p class="text-xs text-brand-600 mt-1"
            x-text="'Deposits: ' + window.formatCurrency(balance?.deposits || 0) + ' · Withdrawals: ' + window.formatCurrency(balance?.withdrawals || 0)"></p>
        </div>

        <!-- New account form -->
        <div x-show="showNewAccount" x-cloak class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 space-y-4">
          <h2 class="font-semibold text-gray-900">New Trust Account</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Bank name *</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="accountForm.bank_name" placeholder="NCB Jamaica" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Account name *</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="accountForm.account_name" placeholder="Client Trust Account" />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Account reference / number *</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="accountForm.account_reference" placeholder="NCB-123456789" />
            </div>
          </div>
          <div class="flex gap-2">
            <button @click="saveAccount()" :disabled="saving || !accountForm.bank_name" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg">
              <span x-text="saving ? 'Saving…' : 'Create Account'"></span>
            </button>
            <button @click="showNewAccount = false" class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
          </div>
        </div>

        <!-- New transaction form -->
        <div x-show="showNewTx" x-cloak class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 space-y-4">
          <h2 class="font-semibold text-gray-900">New Transaction</h2>
          <p class="text-xs text-gray-500">Deposits are auto-approved. Withdrawals, refunds, and transfers require approval from admin/partner/finance.</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Trust account *</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="txForm.trust_account_id">
                <option value="">Select account…</option>
                <template x-for="a in accounts" :key="a.id"><option :value="a.id" x-text="a.account_name + ' — ' + a.bank_name"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Matter *</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="txForm.matter_id">
                <option value="">Select matter…</option>
                <template x-for="m in matters" :key="m.id"><option :value="m.id" x-text="m.matter_number + ' — ' + m.title"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Type *</label>
              <select class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="txForm.transaction_type">
                <template x-for="t in ['deposit','withdrawal','transfer','refund','adjustment']" :key="t"><option :value="t" x-text="t"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Amount (JMD) *</label>
              <input type="number" min="0.01" step="0.01" class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="txForm.amount" placeholder="0.00" />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
              <input class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand-500 outline-none" x-model="txForm.description" placeholder="e.g. Retainer deposit for conveyancing matter" />
            </div>
          </div>
          <div x-show="txError" class="text-sm text-red-600" x-text="txError"></div>
          <div class="flex gap-2">
            <button @click="saveTx()" :disabled="saving || !txForm.trust_account_id || !txForm.matter_id || !txForm.amount || !txForm.description"
              class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg">
              <span x-text="saving ? 'Saving…' : 'Submit Transaction'"></span>
            </button>
            <button @click="showNewTx = false" class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
          </div>
        </div>

        <!-- Transactions -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
          <div class="px-5 py-4 border-b border-gray-200 flex items-center gap-3">
            <h2 class="font-semibold text-gray-900 flex-1">Transactions</h2>
            <template x-for="f in ['','pending','approved','rejected']" :key="f">
              <button @click="txFilter = f; loadTx()"
                :class="txFilter === f ? 'bg-brand-600 text-white border-brand-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                class="px-3 py-1 rounded-lg border text-xs font-medium capitalize" x-text="f || 'All'"></button>
            </template>
          </div>
          <div class="divide-y divide-gray-100">
            <template x-if="transactions.length === 0">
              <p class="px-5 py-8 text-center text-sm text-gray-500">No transactions found.</p>
            </template>
            <template x-for="tx in transactions" :key="tx.id">
              <div class="flex items-start justify-between px-5 py-3">
                <div class="flex items-start gap-3">
                  <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium capitalize mt-0.5"
                    :class="txTypeColor(tx.transaction_type)" x-text="tx.transaction_type"></span>
                  <div>
                    <p class="text-sm font-medium text-gray-900" x-text="tx.description"></p>
                    <p class="text-xs text-gray-400" x-text="window.formatDate(tx.transaction_date) + (tx.matters ? ' · ' + tx.matters.matter_number : '') + (tx.profiles ? ' · ' + tx.profiles.full_name : '')"></p>
                  </div>
                </div>
                <div class="text-right shrink-0 ml-4">
                  <p class="text-sm font-bold" :class="tx.transaction_type === 'deposit' ? 'text-green-700' : 'text-red-700'"
                    x-text="(tx.transaction_type === 'deposit' ? '+' : '-') + window.formatCurrency(tx.amount)"></p>
                  <!-- Approve/reject for pending, if canApprove -->
                  <div x-show="tx.approval_status === 'pending' && canApprove" class="flex gap-2 mt-1 justify-end">
                    <button @click="decide(tx.id, 'approved')" class="text-xs text-green-600 hover:underline flex items-center gap-0.5">
                      <i data-lucide="check-circle-2" class="h-3 w-3"></i>Approve
                    </button>
                    <button @click="decide(tx.id, 'rejected')" class="text-xs text-red-600 hover:underline flex items-center gap-0.5">
                      <i data-lucide="x-circle" class="h-3 w-3"></i>Reject
                    </button>
                  </div>
                  <div x-show="tx.approval_status !== 'pending'">
                    <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium mt-1"
                      :class="tx.approval_status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                      x-text="tx.approval_status"></span>
                  </div>
                  <div x-show="tx.approval_status === 'pending' && !canApprove">
                    <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium mt-1 bg-yellow-100 text-yellow-700">Pending approval</span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

<script>
const TX_TYPE_COLORS = { deposit:'text-green-700 bg-green-50', withdrawal:'text-red-700 bg-red-50', transfer:'text-blue-700 bg-blue-50', refund:'text-orange-700 bg-orange-50', adjustment:'text-gray-700 bg-gray-50' };

function trustPage() {
  return {
    accounts: [], transactions: [], matters: [], balance: null,
    selectedAccountId: '', txFilter: '',
    showNewAccount: false, showNewTx: false, saving: false, txError: '',
    accountForm: { bank_name: '', account_name: '', account_reference: '' },
    txForm: { trust_account_id: '', matter_id: '', transaction_type: 'deposit', amount: '', description: '' },
    canApprove: false, tenantId: '',

    txTypeColor(t) { return TX_TYPE_COLORS[t] || 'bg-gray-100 text-gray-600'; },

    async init() {
      const user = await window.requireAuth();
      if (!user) return;
      const meta = user.user_metadata || {};
      this.tenantId = meta.tenant_id;
      this.canApprove = ['admin', 'partner', 'finance'].includes(meta.role);
      lucide.createIcons();
      const [{ data: acc }, { data: ml }] = await Promise.all([
        window.sb.from('trust_accounts').select('*').order('account_name'),
        window.sb.from('matters').select('id, matter_number, title').order('matter_number'),
      ]);
      this.accounts = acc || [];
      this.matters = ml || [];
      await this.loadTx();
    },

    async selectAccount(id) {
      this.selectedAccountId = this.selectedAccountId === id ? '' : id;
      if (this.selectedAccountId) {
        const { data } = await window.sb.rpc('get_trust_balance', { p_trust_account_id: id });
        this.balance = data;
        this.$nextTick(() => lucide.createIcons());
      } else {
        this.balance = null;
      }
    },

    async loadTx() {
      let q = window.sb.from('trust_transactions')
        .select('*, matters(matter_number), profiles!trust_transactions_created_by_user_id_fkey(full_name)')
        .order('created_at', { ascending: false });
      if (this.selectedAccountId) q = q.eq('trust_account_id', this.selectedAccountId);
      if (this.txFilter) q = q.eq('approval_status', this.txFilter);
      const { data } = await q.limit(100);
      this.transactions = data || [];
      this.$nextTick(() => lucide.createIcons());
    },

    async saveAccount() {
      this.saving = true;
      const { error } = await window.sb.from('trust_accounts').insert({ ...this.accountForm, tenant_id: this.tenantId });
      this.saving = false;
      if (error) { window.toast(error.message, 'error'); return; }
      window.toast('Account created');
      this.showNewAccount = false;
      this.accountForm = { bank_name: '', account_name: '', account_reference: '' };
      const { data } = await window.sb.from('trust_accounts').select('*').order('account_name');
      this.accounts = data || [];
    },

    async saveTx() {
      this.saving = true; this.txError = '';
      const { error } = await window.sb.rpc('create_trust_transaction', {
        p_trust_account_id: this.txForm.trust_account_id,
        p_matter_id:        this.txForm.matter_id,
        p_transaction_type: this.txForm.transaction_type,
        p_amount:           parseFloat(this.txForm.amount),
        p_description:      this.txForm.description,
      });
      this.saving = false;
      if (error) { this.txError = error.message; return; }
      window.toast('Transaction submitted');
      this.showNewTx = false;
      this.txForm = { trust_account_id: '', matter_id: '', transaction_type: 'deposit', amount: '', description: '' };
      if (this.selectedAccountId) await this.selectAccount(this.selectedAccountId);
      await this.loadTx();
    },

    async decide(txId, decision) {
      const { error } = await window.sb.rpc('approve_trust_transaction', { p_transaction_id: txId, p_decision: decision });
      if (error) { window.toast(error.message, 'error'); return; }
      window.toast(decision === 'approved' ? 'Transaction approved' : 'Transaction rejected');
      if (this.selectedAccountId) await this.selectAccount(this.selectedAccountId);
      await this.loadTx();
    },
  };
}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
